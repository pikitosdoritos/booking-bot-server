<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration for training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <script src="script.js" defer></script>
</head>

<body>
    <main class="page">
        <div class="booking-card">
            <h1>Запись на индивидуальную тренировку</h1>
            <h2>Заполните форму для отправки заявки</h2>

            <div class="field">
                <label for="fullname">Имя и фамилия</label>
                <input type="text" name="fullname" id="fullname" placeholder="Иванов Иван Иванович">
            </div>

            <div class="field">
                <label for="phone-number">Номер телефона</label>
                <input type="text" name="phone-number" id="phone-number" placeholder="+380 (__) ___-__-__">
            </div>

            <div class="field">
                <label for="datetime">Дата и время</label>
                <input type="datetime-local" name="datetime" id="datetime">
            </div>

            <div class="field">
                <label class="field-label">Место тренировки</label>

                <div class="place-switch">
                    <input type="radio" name="place" id="gym" value="В зале" checked>
                    <label for="gym">В зале</label>

                    <input type="radio" name="place" id="outside" value="На улице">
                    <label for="outside">На улице</label>
                </div>
            </div>

            <div class="field">
                <label for="comments">Комментарии</label>
                <textarea name="comments" id="comments" placeholder="Пожелания к тренировке, цель, опыт…"></textarea>
            </div>

            <button class="check">Отправить на подтверждение</button>
        </div>
    </main>
</body>

</html>
