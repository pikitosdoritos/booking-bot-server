<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration for training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>Запись на индивидуальную тренировку</h1>
    <h2>Заполните форму для отправки заявки</h2>

    <div>
        <label for="fullname">ФИО</label>
        <input type="text" name="fullname" id="fullname">

        <label for="phone-number">Номер телефона</label>
        <input type="text" name="phone-number" id="phone-number">

        <label for="comments">Коментарии</label>
        <input type="text" name="comments" id="comments">

        <label for="datetime">Дата и время</label>
        <input type="datetime" name="datetime" id="datetime">

        <button class="check">Отправить на подтверждение</button>
    </div>
</body>

</html>
