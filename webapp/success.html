<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
    <link rel="stylesheet" href="static/css/success.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="static/js/success.js" defer></script>
</head>

<body>
    <main>
        <div class="check-wrap">
            <div class="check-mark">
                <svg data-dc-tpl="153" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff"
                    stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                    <path data-dc-tpl="154" d="M5 12.5l4.2 4.2L19 7"></path>
                </svg>

            </div>
        </div>

        <h1>Заявка отправлена</h1>
        <h2>Ожидайте подтверждение записи</h2>

        <div class="card">
            <div class="row">
                <span>Дата</span>
                <b><time datetime="2013-12-25 11:12"></time></b>
            </div>

            <hr>

            <div class="row">
                <span>Место</span>
                <b>В зале</b>
            </div>
        </div>
        <button class="close">Закрыть</button>
    </main>
</body>

</html>
